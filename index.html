<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Present From Kaden 2026</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 40px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.2em;
        }

        p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .heart {
            font-size: 2em;
            animation: float 2s ease-in-out infinite;
            display: inline-block;
            margin-top: 20px;
        }

        @keyframes float {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎁 Present From Kaden 2026</h1>

        <p>
            GitHub Pages テスト成功！
        </p>

        <p>
            Happy Birthday!
        </p>

        <div class="heart">🐾</div>
    </div>
</body>
</html>
