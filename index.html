<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Present From Kaden 2026</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        width:100vw;
        height:100vh;
        overflow:hidden;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:sans-serif;
    }

    .container{
        position:relative;
        width:100%;
        height:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    img{
        width:100%;
        height:100%;
        object-fit:cover;

        /* 初期状態 */
        opacity:0;
        transform:scale(0.05);
        filter:
            brightness(0)
            blur(20px);

        animation:intro 6s ease-out forwards;
    }

    /* 暗転→浮かび上がる映画予告風 */
    @keyframes intro{

        0%{
            opacity:0;
            transform:scale(0.02);
            filter:
                brightness(0)
                blur(30px);
        }

        20%{
            opacity:0.3;
        }

        45%{
            opacity:0.7;
            filter:
                brightness(0.4)
                blur(10px);
        }

        70%{
            opacity:1;
            transform:scale(1.03);

            filter:
                brightness(1.2)
                blur(0px);
        }

        100%{
            opacity:1;
            transform:scale(1);

            filter:
                brightness(1)
                blur(0px);
        }
    }

    /* 微細なシネマ風ノイズ */
    .grain{
        position:absolute;
        inset:0;
        pointer-events:none;
        opacity:0.08;

        background-image:
        repeating-radial-gradient(
            circle at center,
            rgba(255,255,255,0.2) 0px,
            rgba(255,255,255,0.05) 1px,
            transparent 2px
        );

        animation:grainMove 0.3s infinite;
    }

    @keyframes grainMove{
        0%{ transform:translate(0,0); }
        25%{ transform:translate(-1px,1px); }
        50%{ transform:translate(1px,-1px); }
        75%{ transform:translate(1px,1px); }
        100%{ transform:translate(0,0); }
    }

    /* ゆっくり呼吸するようなズーム */
    .slowZoom{
        animation:
            intro 6s ease-out forwards,
            breathing 8s ease-in-out 6s infinite;
    }

    @keyframes breathing{
        0%{
            transform:scale(1);
        }
        50%{
            transform:scale(1.02);
        }
        100%{
            transform:scale(1);
        }
    }

</style>
</head>

<body>

<div class="container">

    <!-- root に置いた画像 -->
    <img src="a.png" alt="準備中" class="slowZoom">

    <!-- シネマ風ノイズ -->
    <div class="grain"></div>

</div>

</body>
</html>
